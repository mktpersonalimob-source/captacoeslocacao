<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptaPro - Controle de Captações</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- jsPDF and AutoTable for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: #f1f5f9; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        .toast-enter { animation: toastEnter 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastEnter { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, addDoc, collection, query, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration setup
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyBxPTPN6UGWt3lkidtwU2hMF_sU7RGOeEo",
                authDomain: "cap-pro-loc.firebaseapp.com",
                projectId: "cap-pro-loc",
                storageBucket: "cap-pro-loc.firebasestorage.app",
                messagingSenderId: "1026522877878",
                appId: "1:1026522877878:web:cc8d2f156fd0bee024bb17",
                measurementId: "G-D00DLYECPN"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        window.db = db;
        window.auth = auth;
        window.signInAnonymously = signInAnonymously;
        window.signInWithCustomToken = signInWithCustomToken;
        window.onAuthStateChanged = onAuthStateChanged;
        window.collection = collection;
        window.query = query;
        window.onSnapshot = onSnapshot;
        window.addDoc = addDoc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.__app_id = typeof __app_id !== 'undefined' ? __app_id : 'captacoes-app';
        window.__initial_auth_token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- Extracted Icons ---
        const Icons = {
            Home: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>,
            DollarSign: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        };

        // --- STREAMING_CHUNK:Defining Utilities and Helpers ---
        const getDefaultStartDate = () => {
            const d = new Date();
            return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
        };

        const getDefaultEndDate = () => {
            const d = new Date();
            return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().split('T')[0];
        };

        const formatMoney = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        const formatDateToBR = (dateString) => {
            if(!dateString) return "";
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        };

        const getMonthNameBR = (monthStr) => {
            if (!monthStr) return "";
            const [year, month] = monthStr.split('-');
            const date = new Date(year, parseInt(month) - 1, 1);
            return date.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        };

        // --- STREAMING_CHUNK:UI Components (Modals & Toasts) ---
        const ConfirmModal = ({ isOpen, title, message, btnConfirm, btnCancel, onConfirm, onCancel, type = "primary" }) => {
            if (!isOpen) return null;
            const btnColor = type === 'danger' ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700';
            
            return (
                <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 slide-up">
                        <h3 className="text-xl font-bold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 mb-8 leading-relaxed">{message}</p>
                        <div className="flex flex-col sm:flex-row gap-3">
                            <button onClick={onCancel} className="flex-1 bg-slate-100 text-slate-700 font-semibold py-2.5 px-4 rounded-xl hover:bg-slate-200 transition">
                                {btnCancel}
                            </button>
                            <button onClick={onConfirm} className={`flex-1 text-white font-semibold py-2.5 px-4 rounded-xl transition shadow-sm ${btnColor}`}>
                                {btnConfirm}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ToastContainer = ({ toasts }) => {
            return (
                <div className="fixed top-20 right-4 z-50 flex flex-col gap-3 pointer-events-none">
                    {toasts.map(toast => (
                        <div key={toast.id} className={`toast-enter pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg border ${toast.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-green-50 border-green-200 text-green-800'}`}>
                            {toast.type === 'error' ? (
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            ) : (
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                            )}
                            <p className="font-medium">{toast.message}</p>
                        </div>
                    ))}
                </div>
            );
        };

        // --- STREAMING_CHUNK:Broker Management Component ---
        const BrokerManager = ({ brokers, user, showToast }) => {
            const [nome, setNome] = useState('');
            const [deletingBroker, setDeletingBroker] = useState(null);

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!nome.trim()) {
                    showToast('Digite o nome do corretor.', 'error');
                    return;
                }
                const isDuplicate = brokers.some(b => b.name.trim().toUpperCase() === nome.trim().toUpperCase());
                if (isDuplicate) {
                    showToast('Este corretor já está cadastrado.', 'error');
                    return;
                }
                try {
                    if (!user) return; 
                    const ref = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers');
                    await window.addDoc(ref, { name: nome.trim(), createdAt: new Date().toISOString() });
                    setNome('');
                    showToast('Corretor cadastrado com sucesso!', 'success');
                } catch (err) {
                    console.error("Erro:", err);
                    showToast('Erro ao salvar corretor.', 'error');
                }
            };

            const handleDelete = async () => {
                if (!deletingBroker) return;
                try {
                    if (!user) return;
                    const docRef = window.doc(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers', deletingBroker.id);
                    await window.deleteDoc(docRef);
                    setDeletingBroker(null);
                    showToast('Corretor removido com sucesso.', 'success');
                } catch (err) {
                    showToast("Erro ao excluir corretor.", "error");
                }
            };

            return (
                <div className="max-w-2xl mx-auto mt-6 slide-up">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div className="mb-8">
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-2">
                                <Icons.Users /> Gestão da Equipe
                            </h2>
                            <p className="text-slate-500">Adicione ou remova corretores que farão captações.</p>
                        </div>
                        
                        <form onSubmit={handleAdd} className="flex flex-col sm:flex-row gap-3 mb-8">
                            <input 
                                type="text" 
                                value={nome}
                                onChange={(e) => setNome(e.target.value)}
                                className="flex-1 px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm"
                                placeholder="Nome completo do corretor..."
                            />
                            <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition shadow-sm whitespace-nowrap">
                                Adicionar Corretor
                            </button>
                        </form>

                        <div className="border-t border-slate-100 pt-6">
                            <h3 className="font-semibold text-slate-700 mb-4 flex items-center gap-2">
                                Corretores Ativos 
                                <span className="bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-full">{brokers.length}</span>
                            </h3>
                            {brokers.length === 0 ? (
                                <div className="text-slate-500 flex flex-col items-center justify-center py-10 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                    <Icons.Users />
                                    <p className="mt-2 text-sm font-medium">Nenhum corretor cadastrado ainda.</p>
                                </div>
                            ) : (
                                <ul className="space-y-3 max-h-96 overflow-y-auto pr-2">
                                    {brokers.map(broker => (
                                        <li key={broker.id} className="flex items-center justify-between bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-blue-300 transition group">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-blue-50 text-blue-600 p-2 rounded-lg">
                                                    <Icons.User />
                                                </div>
                                                <span className="font-semibold text-slate-700">{broker.name}</span>
                                            </div>
                                            <button 
                                                onClick={() => setDeletingBroker(broker)} 
                                                className="text-slate-300 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition opacity-0 group-hover:opacity-100"
                                                title="Remover Corretor"
                                            >
                                                <Icons.Trash />
                                            </button>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>

                    <ConfirmModal 
                        isOpen={!!deletingBroker}
                        title="Remover Corretor"
                        message={`Deseja remover "${deletingBroker?.name}" da equipe? Isso NÃO apagará o histórico das captações antigas realizadas por ele.`}
                        btnConfirm="Sim, Remover"
                        btnCancel="Cancelar"
                        type="danger"
                        onCancel={() => setDeletingBroker(null)}
                        onConfirm={handleDelete}
                    />
                </div>
            );
        };

        // --- STREAMING_CHUNK:Capture Registration Form ---
        const CaptureForm = ({ user, setView, brokers, showToast }) => {
            const [corretor, setCorretor] = useState('');
            const [codigo, setCodigo] = useState('');
            const [data, setData] = useState(new Date().toISOString().split('T')[0]); // Default to today
            const [showConfirm, setShowConfirm] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!corretor || !codigo || !data) {
                    showToast("Preencha corretor, código e data!", "error");
                    return;
                }
                if (!user) {
                    showToast("Aguarde a conexão com o banco...", "error");
                    return;
                }

                try {
                    const capturesRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures');
                    await window.addDoc(capturesRef, {
                        corretor: corretor.trim(),
                        codigo: codigo.trim().toUpperCase(),
                        data: data,
                        createdAt: new Date().toISOString()
                    });
                    
                    setShowConfirm(true);
                    showToast("Captação registrada com sucesso!", "success");
                } catch (err) {
                    console.error("Erro ao salvar:", err);
                    showToast("Erro ao salvar a captação. Tente novamente.", "error");
                }
            };

            const handleNewRegistration = () => {
                setCodigo('');
                // Keep broker, date and type to speed up bulk entry
                setShowConfirm(false);
            };

            if (brokers.length === 0) {
                return (
                    <div className="max-w-xl mx-auto mt-6 slide-up text-center">
                        <div className="bg-white p-8 md:p-12 rounded-2xl shadow-sm border border-slate-200">
                            <div className="bg-amber-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-amber-600">
                                <Icons.Users />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-3">Equipe Vazia</h2>
                            <p className="text-slate-600 mb-8 leading-relaxed">Para registrar uma captação de imóvel, primeiro você precisa cadastrar os corretores que fazem parte da sua equipe.</p>
                            <button onClick={() => setView('brokers')} className="bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-3 px-8 rounded-xl shadow-md">
                                Cadastrar Corretores Agora
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto mt-6 slide-up">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div className="mb-6 border-b border-slate-100 pb-4">
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                <Icons.Plus /> Registrar Captação
                            </h2>
                            <p className="text-slate-500 text-sm mt-1">Insira os detalhes do novo imóvel captado.</p>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Corretor Responsável <span className="text-red-500">*</span></label>
                                    <select 
                                        value={corretor}
                                        onChange={(e) => setCorretor(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 hover:bg-white"
                                    >
                                        <option value="" disabled>Selecione quem captou...</option>
                                        {brokers.map(b => (
                                            <option key={b.id} value={b.name}>{b.name}</option>
                                        ))}
                                    </select>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Código do Imóvel <span className="text-red-500">*</span></label>
                                    <input 
                                        type="text" 
                                        value={codigo}
                                        onChange={(e) => setCodigo(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 hover:bg-white uppercase"
                                        placeholder="Ex: AP123"
                                    />
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Data da Captação <span className="text-red-500">*</span></label>
                                    <input 
                                        type="date" 
                                        value={data}
                                        onChange={(e) => setData(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-slate-50 hover:bg-white"
                                    />
                                </div>
                            </div>
                            
                            <div className="pt-4 mt-6 border-t border-slate-100">
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl transition shadow-lg shadow-blue-200 text-lg flex items-center justify-center gap-2">
                                    <Icons.Plus /> Salvar Captação
                                </button>
                            </div>
                        </form>
                    </div>

                    <ConfirmModal 
                        isOpen={showConfirm}
                        title="Sucesso!"
                        message="O imóvel foi salvo no banco de dados. O que deseja fazer agora?"
                        btnConfirm="Cadastrar Outro"
                        btnCancel="Ver Dashboard"
                        onConfirm={handleNewRegistration}

        // --- STREAMING_CHUNK:Broker Specific Details and Editing ---
        const BrokerDetails = ({ captures, brokerName, onBack, user, brokers, showToast }) => {

                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">

                                    <input 
                                        type="text" 
                                        placeholder="Buscar código..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}

                        <div className="flex items-center justify-between mb-4 mt-6 bg-slate-50 p-3 rounded-lg border border-slate-100">

                            <div className="flex items-center gap-3">
                                <button onClick={exportBrokerPDF} className="flex items-center gap-1 bg-slate-800 hover:bg-slate-900 text-white text-xs font-semibold px-3 py-1.5 rounded-lg shadow-sm transition">

                        {filteredData.length === 0 ? (
                            <div className="text-center py-12 text-slate-500 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                Nenhum registro encontrado com estes filtros.

                        ) : (

                                <table className="w-full text-left border-collapse">

        // --- STREAMING_CHUNK:Finance Management Component ---
        const Finance = ({ captures, payments, brokers, user, showToast }) => {
            const [dataInicio, setDataInicio] = useState(getDefaultStartDate());
            const [dataFim, setDataFim] = useState(getDefaultEndDate());
            const [selectedBroker, setSelectedBroker] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [deletingItem, setDeletingItem] = useState(null); // Adicionado estado para exclusão
            
            // Lançamento form state
            const [selectedCapture, setSelectedCapture] = useState('');
            const [valor, setValor] = useState('');
            
            const filteredPayments = useMemo(() => {
                return payments.filter(p => {
                    const matchDate = p.dataRegistro >= dataInicio && p.dataRegistro <= dataFim;
                    const matchBroker = selectedBroker ? p.corretor === selectedBroker : true;
                    return matchDate && matchBroker;
                }).sort((a, b) => new Date(b.dataRegistro) - new Date(a.dataRegistro));
            }, [payments, dataInicio, dataFim, selectedBroker]);

            const handleAddPayment = async (e) => {
                e.preventDefault();
                if (!selectedCapture || !valor) {
                    showToast("Selecione a captação e informe o valor.", "error");
                    return;
                }
                const numValor = parseFloat(valor.replace(',', '.'));
                if (isNaN(numValor) || numValor <= 0) {
                    showToast("Valor inválido.", "error");
                    return;
                }
                const cap = captures.find(c => c.id === selectedCapture);
                if (!cap) return;

                try {
                    if (!user) return;
                    const payRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'payments');
                    await window.addDoc(payRef, {
                        captureId: cap.id,
                        codigo: cap.codigo,
                        corretor: cap.corretor,
                        dataCaptacao: cap.data,
                        valor: numValor,
                        status: 'A pagar',
                        dataRegistro: new Date().toISOString().split('T')[0],
                        createdAt: new Date().toISOString()
                    });
                    
                    setSelectedCapture('');
                    setValor('');
                    setIsModalOpen(false);
                    showToast("Valor a pagar lançado com sucesso!", "success");
                } catch (err) {
                    showToast("Erro ao lançar pagamento.", "error");
                }
            };

            const toggleStatus = async (payment) => {
                try {
                    if (!user) return;
                    const newStatus = payment.status === 'A pagar' ? 'Paga' : 'A pagar';
                    const docRef = window.doc(window.db, 'artifacts', window.__app_id, 'public', 'data', 'payments', payment.id);
                    await window.updateDoc(docRef, { status: newStatus });
                    showToast(`Status atualizado para ${newStatus}.`, "success");
                } catch (err) {
                    showToast("Erro ao atualizar status.", "error");
                }
            };

            const exportPDF = () => {
                if (filteredPayments.length === 0) {
                    showToast("Nenhum dado para exportar.", "error");
                    return;
                }
                try {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    
                    doc.setFontSize(16);
                    doc.text('Relatório Financeiro - Captações a Pagar/Pagas', 14, 20);
                    doc.setFontSize(11);
                    doc.text(`Período: ${formatDateToBR(dataInicio)} a ${formatDateToBR(dataFim)}`, 14, 28);
                    
                    // Grouping logic by broker
                    const grouped = {};
                    filteredPayments.forEach(p => {
                        if (!grouped[p.corretor]) grouped[p.corretor] = [];
                        grouped[p.corretor].push(p);
                    });

                    let currentY = 35;

                    for (const [broker, pays] of Object.entries(grouped)) {
                        if (currentY > 250) {
                            doc.addPage();
                            currentY = 20;
                        }

                        // Verificar Meta Batida (Mais de 6 captações NO PERÍODO para este corretor)
                        const capturesInPeriod = captures.filter(c => c.corretor === broker && c.data >= dataInicio && c.data <= dataFim).length;
                        const metaLabel = capturesInPeriod > 6 ? ' - (Meta batida)' : '';

                        doc.setFontSize(12);
                        doc.setTextColor(37, 99, 235);
                        doc.text(`Corretor: ${broker}${metaLabel}`, 14, currentY);
                        doc.setTextColor(0, 0, 0);

                        const tableData = pays.map(p => [
                            p.codigo, 
                            formatDateToBR(p.dataCaptacao),
                            p.status,
                            formatMoney(p.valor)
                        ]);
                        
                        const total = pays.reduce((sum, p) => sum + p.valor, 0);
                        tableData.push([{ content: 'TOTAL DO CORRETOR', colSpan: 3, styles: { fontStyle: 'bold', halign: 'right' } }, { content: formatMoney(total), styles: { fontStyle: 'bold' } }]);

                        doc.autoTable({
                            startY: currentY + 4,
                            head: [['Código Captação', 'Data Captação', 'Status', 'Valor']],
                            body: tableData,
                            theme: 'grid',
                            headStyles: { fillColor: [226, 232, 240], textColor: [15, 23, 42] },
                            styles: { fontSize: 10 },
                            margin: { bottom: 15 }
                        });
                        
                        currentY = doc.lastAutoTable.finalY + 15;
                    }
                    
                    doc.save('financeiro_captacoes.pdf');
                    showToast("PDF financeiro gerado com sucesso!", "success");
                } catch(e) {
                    showToast("Erro ao gerar PDF.", "error");
                }
            };

            return (
                <div className="max-w-5xl mx-auto mt-6 slide-up">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-4 border-b border-slate-100 pb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                    <Icons.DollarSign /> Captações a Pagar
                                </h2>
                                <p className="text-slate-500 text-sm mt-1">Gerencie os lançamentos e pagamentos financeiros das captações.</p>
                            </div>
                            
                            <div className="flex flex-wrap items-center gap-3 w-full lg:w-auto">
                                <div className="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 w-full sm:w-auto">
                                    <span className="text-sm text-slate-500 mr-2">De:</span>
                                    <input type="date" value={dataInicio} onChange={(e) => setDataInicio(e.target.value)} className="outline-none bg-transparent w-full sm:w-32 font-medium" />
                                    <span className="text-sm text-slate-500 mx-2">Até:</span>
                                    <input type="date" value={dataFim} onChange={(e) => setDataFim(e.target.value)} className="outline-none bg-transparent w-full sm:w-32 font-medium" />
                                </div>
                                <select 
                                    value={selectedBroker}
                                    onChange={(e) => setSelectedBroker(e.target.value)}
                                    className="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 outline-none font-medium w-full sm:w-auto"
                                >
                                    <option value="">Todos os Corretores</option>
                                    {brokers.map(b => <option key={b.id} value={b.name}>{b.name}</option>)}
                                </select>
                                <div className="flex gap-2 w-full sm:w-auto">
                                    <button onClick={() => setIsModalOpen(true)} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm transition">
                                        <Icons.Plus /> Lançar Valor
                                    </button>
                                    <button onClick={exportPDF} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm transition">
                                        <Icons.FileText /> Relatório PDF
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* List */}
                        {filteredPayments.length === 0 ? (
                            <div className="text-center py-16 text-slate-500 bg-slate-50 rounded-2xl border border-dashed border-slate-200">
                                <Icons.DollarSign className="w-10 h-10 mx-auto text-slate-300 mb-3" />
                                <p className="mb-4 text-lg">Nenhum pagamento registrado neste período.</p>
                                <button onClick={() => setIsModalOpen(true)} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-semibold py-2 px-6 rounded-lg transition shadow-sm">
                                    Fazer um lançamento agora
                                </button>
                            </div>
                        ) : (
                            <div className="overflow-x-auto border border-slate-200 rounded-xl">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm">
                                            <th className="py-4 px-5 font-bold">Captação (Cód)</th>
                                            <th className="py-4 px-5 font-bold">Corretor</th>
                                            <th className="py-4 px-5 font-bold">Data Ref.</th>
                                            <th className="py-4 px-5 font-bold">Valor</th>
                                            <th className="py-4 px-5 font-bold">Status</th>
                                            <th className="py-4 px-5 font-bold text-right">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {filteredPayments.map((p) => (
                                            <tr key={p.id} className="border-b border-slate-100 hover:bg-blue-50/30 transition last:border-0">
                                                <td className="py-4 px-5 font-bold text-slate-800">{p.codigo}</td>
                                                <td className="py-4 px-5 text-slate-600 font-medium">{p.corretor}</td>
                                                <td className="py-4 px-5 text-slate-500">{formatDateToBR(p.dataRegistro)}</td>
                                                <td className="py-4 px-5 text-slate-800 font-black">{formatMoney(p.valor)}</td>
                                                <td className="py-4 px-5">
                                                    <span className={`px-3 py-1 rounded-full text-xs font-bold shadow-sm inline-flex items-center gap-1 ${p.status === 'Paga' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                                                        {p.status === 'Paga' && <Icons.CheckCircle className="w-3 h-3" />} {p.status}
                                                    </span>
                                                </td>
                                                <td className="py-4 px-5 text-right">
                                                    <div className="flex items-center justify-end gap-2">
                                                        <button 
                                                            onClick={() => toggleStatus(p)} 
                                                            className={`text-xs font-bold px-3 py-1.5 rounded-lg transition border shadow-sm ${p.status === 'A pagar' ? 'bg-green-50 text-green-600 border-green-200 hover:bg-green-600 hover:text-white' : 'bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-200'}`}
                                                        >
                                                            {p.status === 'A pagar' ? 'Pagar' : 'Desfazer'}
                                                        </button>
                                                        <button 
                                                            onClick={() => setDeletingItem(p)}
                                                            className="text-slate-400 hover:text-red-600 p-1.5 hover:bg-red-50 rounded-lg transition"
                                                            title="Remover Lançamento"
                                                        >
                                                            <Icons.Trash />
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>

                    {/* Delete Confirm Modal */}
                    <ConfirmModal 
                        isOpen={!!deletingItem}
                        title="Excluir Lançamento Financeiro"
                        message="Deseja realmente remover este lançamento financeiro? Esta ação não pode ser desfeita."
                        btnConfirm="Sim, Excluir"
                        btnCancel="Cancelar"
                        type="danger"
                        onCancel={() => setDeletingItem(null)}
                        onConfirm={async () => {
                            try {
                                if (!user) return;
                                const docRef = window.doc(window.db, 'artifacts', window.__app_id, 'public', 'data', 'payments', deletingItem.id);
                                await window.deleteDoc(docRef);
                                setDeletingItem(null);
                                showToast("Lançamento excluído.", "success");
                            } catch (err) {
                                showToast("Erro ao excluir lançamento.", "error");
                            }
                        }}
                    />

                    {/* Add Payment Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                            <div className="bg-white rounded-2xl shadow-xl max-w-lg w-full p-6 slide-up">
                                <h3 className="text-xl font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3 flex items-center gap-2">
                                    <Icons.DollarSign /> Novo Lançamento
                                </h3>
                                <form onSubmit={handleAddPayment} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1">Selecione a Captação</label>
                                        <select 
                                            value={selectedCapture}
                                            onChange={(e) => setSelectedCapture(e.target.value)}
                                            className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 hover:bg-white transition"
                                        >
                                            <option value="" disabled>Pesquise ou selecione...</option>
                                            {captures.slice().sort((a,b) => new Date(b.data) - new Date(a.data)).map(c => (
                                                <option key={c.id} value={c.id}>
                                                    {c.codigo} - {c.corretor} ({formatDateToBR(c.data)})
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-slate-700 mb-1">Valor a Pagar (R$)</label>
                                        <input 
                                            type="number"
                                            step="0.01"
                                            value={valor}
                                            onChange={(e) => setValor(e.target.value)}
                                            placeholder="Ex: 150.00"
                                            className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 hover:bg-white transition"
                                        />
                                    </div>
                                    <div className="flex gap-3 mt-8 pt-4 border-t border-slate-100">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-semibold hover:bg-slate-200 transition">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition shadow-sm">Lançar a Pagar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- STREAMING_CHUNK:Backup and Restore Management ---
        const BackupManager = ({ captures, payments, user, brokers, showToast }) => {
            const fileInputRef = useRef(null);
            const [isLoading, setIsLoading] = useState(false);

            const handleExport = () => {
                if (captures.length === 0 && brokers.length === 0 && payments.length === 0) {
                    showToast('Nenhum dado para exportar.', 'error');
                    return;
                }
                
                const dataToExport = {
                    captures: captures.map(({ corretor, codigo, data }) => ({ corretor, codigo, data })),
                    brokers: brokers.map(({ name }) => ({ name })),
                    payments: payments.map(({ captureId, codigo, corretor, dataCaptacao, valor, status, dataRegistro }) => ({ captureId, codigo, corretor, dataCaptacao, valor, status, dataRegistro }))
                };
                const dataStr = JSON.stringify(dataToExport, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                link.href = url;
                link.download = `backup_captacoes_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast("Backup baixado com sucesso!", "success");
            };

            const triggerImport = () => {
                if (fileInputRef.current) {
                    fileInputRef.current.value = ''; 
                    fileInputRef.current.click();
                }
            };

            const handleImportFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsLoading(true);

                try {
                    if (!user) throw new Error("Aguarde a conexão com o sistema.");
                    let importData;
                    try { importedData = JSON.parse(fileContent); } 
                    catch (parseErr) { throw new Error("Arquivo inválido. Use um .json exportado pelo CaptaPro."); }
                    
                    let importCaptures = [];
                    let importBrokers = [];
                    let importPayments = [];

                    if (Array.isArray(importedData)) {
                        importCaptures = importedData;
                    } else if (importedData && typeof importedData === 'object') {
                        importCaptures = Array.isArray(importedData.captures) ? importedData.captures : [];
                        importBrokers = Array.isArray(importedData.brokers) ? importedData.brokers : [];
                        importPayments = Array.isArray(importedData.payments) ? importedData.payments : [];
                    } else {
                        throw new Error("Formato de arquivo não reconhecido.");
                    }

                    let newCapturesCount = 0;
                    let newBrokersCount = 0;
                    let newPaymentsCount = 0;
                    const capturesRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures');
                    const brokersRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers');
                    const paymentsRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'payments');

                    const safeString = (val) => (val === null || val === undefined) ? '' : String(val);
                    const currentBrokerNames = brokers.map(b => safeString(b.name).trim().toUpperCase()).filter(Boolean);
                    
                    for (const item of importBrokers) {
                        const bName = safeString(item.name).trim();
                        if (!bName) continue;
                        const nameUpper = bName.toUpperCase();
                        if (!currentBrokerNames.includes(nameUpper)) {
                            await window.addDoc(brokersRef, { name: bName, createdAt: new Date().toISOString() });
                            currentBrokerNames.push(nameUpper); 
                            newBrokersCount++;
                        }
                    }

                    const addedCapturesKeys = new Set(); 

                    for (const item of importCaptures) {
                        const cCorretor = safeString(item.corretor).trim();
                        const cCodigo = safeString(item.codigo).trim();
                        const cData = safeString(item.data).trim();

                        if (!cCorretor || !cCodigo || !cData) continue;

                        const brokerUpper = cCorretor.toUpperCase();
                        if (!currentBrokerNames.includes(brokerUpper)) {
                            await window.addDoc(brokersRef, { name: cCorretor, createdAt: new Date().toISOString() });
                            currentBrokerNames.push(brokerUpper);
                            newBrokersCount++;
                        }

                        const uniqueKey = `${brokerUpper}_${cCodigo.toUpperCase()}_${cData}`;
                        if (addedCapturesKeys.has(uniqueKey)) continue;

                        const isDuplicate = captures.some(c => 
                            safeString(c.corretor).trim().toUpperCase() === brokerUpper &&
                            safeString(c.codigo).trim().toUpperCase() === cCodigo.toUpperCase() &&
                            safeString(c.data).trim() === cData
                        );

                        if (!isDuplicate) {
                            await window.addDoc(capturesRef, {
                                corretor: cCorretor,
                                codigo: cCodigo,
                                data: cData,
                                createdAt: new Date().toISOString()
                            });
                            addedCapturesKeys.add(uniqueKey);
                            newCapturesCount++;
                        }
                    }

                    for (const item of importPayments) {
                        const { captureId, codigo, corretor, dataCaptacao, valor, status, dataRegistro } = item;
                        if (!codigo || !valor) continue;
                        
                        await window.addDoc(paymentsRef, {
                            captureId: safeString(captureId),
                            codigo: safeString(codigo),
                            corretor: safeString(corretor),
                            dataCaptacao: safeString(dataCaptacao),
                            valor: Number(valor),
                            status: safeString(status),
                            dataRegistro: safeString(dataRegistro),
                            createdAt: new Date().toISOString()
                        });
                        newPaymentsCount++;
                    }
                    
                    showToast(`Importação concluída! ${newCapturesCount} captações, ${newPaymentsCount} pagamentos e ${newBrokersCount} corretores inseridos.`, "success");
                } catch (error) {
                    showToast(error.message || "Erro inesperado ao ler o arquivo.", "error");
                } finally {
                    setIsLoading(false);
                    if (fileInputRef.current) fileInputRef.current.value = '';
                }
            };

            return (
                <div className="max-w-xl mx-auto mt-6 slide-up">
                    <div className="bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-slate-200 text-center">
                        <div className="bg-indigo-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-indigo-600 shadow-inner">
                            <Icons.Download />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-3">Backup Seguro</h2>
                        <p className="text-slate-500 mb-8 leading-relaxed">
                            Mantenha seus dados seguros exportando um arquivo. O sistema ignora duplicatas automaticamente ao importar um backup.
                        </p>

                        <div className="flex flex-col gap-4">
                            <button 
                                onClick={handleExport}
                                className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-4 rounded-xl transition shadow-md"
                            >
                                <Icons.Download /> Baixar Backup (.json)
                            </button>

                            <input 
                                type="file" 
                                accept=".json, application/json, .txt" 
                                ref={fileInputRef} 
                                className="hidden" 
                                onChange={handleImportFile}
                            />
                            
                            <button 
                                onClick={triggerImport}
                                disabled={isLoading}
                                className={`w-full flex items-center justify-center gap-2 border-2 font-bold py-3.5 px-4 rounded-xl transition ${isLoading ? 'bg-slate-50 border-slate-200 text-slate-400 cursor-wait' : 'bg-white border-slate-300 hover:border-slate-400 hover:bg-slate-50 text-slate-700 shadow-sm'}`}
                            >
                                {isLoading ? (
                                    <span className="animate-pulse flex items-center gap-2">Processando Backup...</span>
                                ) : (
                                    <><Icons.Upload /> Restaurar Dados (.json)</>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- STREAMING_CHUNK:Main Application Container ---
        const App = () => {
            const [view, setView] = useState('dashboard');
            const [selectedBroker, setSelectedBroker] = useState(null);
            
            const [user, setUser] = useState(null);
            const [captures, setCaptures] = useState([]);
            const [payments, setPayments] = useState([]);
            const [brokers, setBrokers] = useState([]);
            const [authLoading, setAuthLoading] = useState(true);
            
            // Toast state
            const [toasts, setToasts] = useState([]);

            const showToast = useCallback((message, type = 'info') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 4000);
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (window.__initial_auth_token) {
                            await window.signInWithCustomToken(window.auth, window.__initial_auth_token);
                        } else {
                            await window.signInAnonymously(window.auth);
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };

                const unsubscribeAuth = window.onAuthStateChanged(window.auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                    
                    if (currentUser) {
                        const capturesRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures');
                        const qCaptures = window.query(capturesRef);
                        const unsubscribeData = window.onSnapshot(qCaptures, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setCaptures(data);
                        });

                        const brokersRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers');
                        const qBrokers = window.query(brokersRef);
                        const unsubscribeBrokers = window.onSnapshot(qBrokers, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            data.sort((a, b) => a.name.localeCompare(b.name));
                            setBrokers(data);
                        });

                        const paymentsRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'payments');
                        const qPayments = window.query(paymentsRef);
                        const unsubscribePayments = window.onSnapshot(qPayments, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setPayments(data);
                        });

                        return () => {
                            unsubscribeData();
                            unsubscribeBrokers();
                            unsubscribePayments();
                        };
                    } else {
                        setCaptures([]);
                        setBrokers([]);
                        setPayments([]);
                    }
                });

                initAuth();
                return () => unsubscribeAuth();
            }, []);

            const navigate = (newView) => {
                setView(newView);
                setSelectedBroker(null);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleBrokerSelect = (brokerName) => {
                setSelectedBroker(brokerName);
                setView('broker');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            if (authLoading) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                        <div className="text-slate-500 font-medium animate-pulse">Conectando ao banco seguro...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <ToastContainer toasts={toasts} />
                    
                    {/* Header */}
                    <header className="bg-white/80 backdrop-blur-md shadow-sm border-b border-slate-200 sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6">
                            <div className="flex justify-between items-center h-16">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => navigate('dashboard')}>
                                    <div className="bg-blue-600 text-white p-1.5 rounded-lg shadow-sm">
                                        <Icons.Home />
                                    </div>
                                    <h1 className="text-xl font-black text-slate-800 tracking-tight">Capta<span className="text-blue-600">Pro</span></h1>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="flex items-center gap-1.5 text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                                        <span className={`w-2 h-2 rounded-full ${user ? 'bg-green-500' : 'bg-red-500'}`}></span>
                                        {user ? 'Online' : 'Offline'}
                                    </div>
                                    <div className="hidden sm:flex items-center space-x-1">
                                        <NavButton icon={<Icons.Home />} label="Painel" active={view === 'dashboard' || view === 'broker'} onClick={() => navigate('dashboard')} />
                                        <NavButton icon={<Icons.DollarSign />} label="Financeiro" active={view === 'financeiro'} onClick={() => navigate('financeiro')} />
                                        <NavButton icon={<Icons.Users />} label="Equipe" active={view === 'brokers'} onClick={() => navigate('brokers')} />
                                        <NavButton icon={<Icons.Plus />} label="Nova Captação" active={view === 'form'} onClick={() => navigate('form')} highlight />
                                        <div className="w-px h-6 bg-slate-200 mx-2"></div>
                                        <NavButton icon={<Icons.Download />} label="Backup" active={view === 'backup'} onClick={() => navigate('backup')} />
                                    </div>
                                    {/* Mobile menu shortlinks */}
                                    <div className="sm:hidden flex items-center gap-1">
                                        <NavButton icon={<Icons.Plus />} label="" active={view === 'form'} onClick={() => navigate('form')} highlight />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Mobile Bottom Navigation (Visible only on small screens) */}
                    <nav className="sm:hidden fixed bottom-0 w-full bg-white border-t border-slate-200 z-40 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <div className="flex justify-around items-center h-16 px-1">
                            <MobileNavButton icon={<Icons.Home />} label="Painel" active={view === 'dashboard' || view === 'broker'} onClick={() => navigate('dashboard')} />
                            <MobileNavButton icon={<Icons.DollarSign />} label="Finanças" active={view === 'financeiro'} onClick={() => navigate('financeiro')} />
                            <MobileNavButton icon={<Icons.Plus />} label="Nova" active={view === 'form'} onClick={() => navigate('form')} highlight />
                            <MobileNavButton icon={<Icons.Users />} label="Equipe" active={view === 'brokers'} onClick={() => navigate('brokers')} />
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 w-full max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8 overflow-x-hidden pb-24 sm:pb-8">
                        {view === 'form' && <CaptureForm user={user} setView={navigate} brokers={brokers} showToast={showToast} />}
                        {view === 'financeiro' && <Finance captures={captures} payments={payments} brokers={brokers} user={user} showToast={showToast} />}
                        {view === 'brokers' && <BrokerManager user={user} brokers={brokers} showToast={showToast} />}
                        {view === 'dashboard' && <Dashboard captures={captures} setView={navigate} onSelectBroker={handleBrokerSelect} showToast={showToast} />}
                        {view === 'broker' && selectedBroker && <BrokerDetails captures={captures} brokerName={selectedBroker} onBack={() => navigate('dashboard')} user={user} brokers={brokers} showToast={showToast} />}
                        {view === 'backup' && <BackupManager captures={captures} payments={payments} user={user} brokers={brokers} showToast={showToast} />}
                    </main>

                    <footer className="py-6 text-center text-slate-400 text-xs border-t border-slate-100 bg-white">
                        <p>Versão 2.0 - Criado por Guilherme Montoani</p>
                    </footer>
                </div>
            );
        };

        // UI Helpers
        const NavButton = ({ icon, label, active, onClick, highlight }) => {
            if (highlight) {
                return (
                    <button onClick={onClick} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition shadow-sm ${active ? 'bg-blue-700 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                        {icon} <span>{label}</span>
                    </button>
                );
            }
            return (
                <button onClick={onClick} className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold transition ${active ? 'bg-slate-100 text-blue-700' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900'}`}>
                    {icon} <span>{label}</span>
                </button>
            );
        }

        const MobileNavButton = ({ icon, label, active, onClick, highlight }) => {
            if (highlight) {
                 return (
                    <button onClick={onClick} className="flex flex-col items-center justify-center w-full h-full relative top-[-10px]">
                        <div className={`p-3 rounded-full shadow-lg ${active ? 'bg-blue-700 text-white shadow-blue-300' : 'bg-blue-600 text-white'}`}>
                            {icon}
                        </div>
                        <span className={`text-[10px] mt-1 font-bold ${active ? 'text-blue-700' : 'text-slate-500'}`}>{label}</span>
                    </button>
                );
            }
            return (
                <button onClick={onClick} className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition ${active ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
                    {icon}
                    <span className="text-[10px] font-bold">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
