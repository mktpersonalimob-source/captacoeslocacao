<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Captações de Locação</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- jsPDF and AutoTable for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, addDoc, collection, query, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration setup
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBxPTPN6UGWt3lkidtwU2hMF_sU7RGOeEo",
            authDomain: "cap-pro-loc.firebaseapp.com",
            projectId: "cap-pro-loc",
            storageBucket: "cap-pro-loc.firebasestorage.app",
            messagingSenderId: "1026522877878",
            appId: "1:1026522877878:web:cc8d2f156fd0bee024bb17",
            measurementId: "G-D00DLYECPN"
        };
        
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        window.db = db;
        window.auth = auth;
        window.signInAnonymously = signInAnonymously;
        window.signInWithCustomToken = signInWithCustomToken;
        window.onAuthStateChanged = onAuthStateChanged;
        window.collection = collection;
        window.query = query;
        window.onSnapshot = onSnapshot;
        window.addDoc = addDoc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.__app_id = typeof __app_id !== 'undefined' ? __app_id : 'captacoes-app';
        window.__initial_auth_token = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
    </script>

    <script type="text/babel">
        // --- Icons ---
        const IconHome = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;

        const { useState, useEffect, useRef, useMemo } = React;

        // --- Utils ---
        const getCurrentMonthStr = () => {
            const d = new Date();
            const m = (d.getMonth() + 1).toString().padStart(2, '0');
            return `${d.getFullYear()}-${m}`;
        };

        const formatDateToBR = (dateString) => {
            if(!dateString) return "";
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}/${year}`;
        };

        const getMonthNameBR = (monthStr) => {
            if (!monthStr) return "";
            const [year, month] = monthStr.split('-');
            const date = new Date(year, parseInt(month) - 1, 1);
            return date.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });
        };

        // --- Modals ---
        const AlertModal = ({ isOpen, message, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 fade-in">
                        <h3 className="text-lg font-bold text-slate-800 mb-4">Aviso</h3>
                        <p className="text-slate-600 mb-6">{message}</p>
                        <button onClick={onClose} className="w-full bg-blue-600 text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-700 transition">
                            Entendi
                        </button>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, title, message, btnConfirm, btnCancel, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-xl max-w-md w-full p-6 fade-in">
                        <h3 className="text-lg font-bold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 mb-6">{message}</p>
                        <div className="flex flex-col sm:flex-row gap-3">
                            <button onClick={onCancel} className="flex-1 bg-slate-100 text-slate-700 font-medium py-2 px-4 rounded-lg hover:bg-slate-200 transition">
                                {btnCancel}
                            </button>
                            <button onClick={onConfirm} className="flex-1 bg-blue-600 text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-700 transition">
                                {btnConfirm}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Sub-Components ---
        const BrokerManager = ({ brokers, user }) => {
            const [nome, setNome] = useState('');
            const [showAlert, setShowAlert] = useState({ show: false, msg: '' });
            const [deletingBroker, setDeletingBroker] = useState(null);

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!nome.trim()) {
                    setShowAlert({ show: true, msg: 'Digite o nome do corretor.' });
                    return;
                }
                const isDuplicate = brokers.some(b => b.name.trim().toUpperCase() === nome.trim().toUpperCase());
                if (isDuplicate) {
                    setShowAlert({ show: true, msg: 'Este corretor já está cadastrado.' });
                    return;
                }
                try {
                    if (!user) return; // Aguarda silenciosamente a conexão
                    const ref = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers');
                    await window.addDoc(ref, { name: nome.trim(), createdAt: new Date().toISOString() });
                    setNome('');
                    setShowAlert({ show: true, msg: 'Corretor cadastrado com sucesso!' });
                } catch (err) {
                    console.error("Erro:", err);
                    setShowAlert({ show: true, msg: 'Erro ao salvar corretor.' });
                }
            };

            const handleDelete = async () => {
                if (!deletingBroker) return;
                try {
                    if (!user) return;
                    const docRef = window.doc(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers', deletingBroker.id);
                    await window.deleteDoc(docRef);
                    setDeletingBroker(null);
                } catch (err) {
                    setShowAlert({ show: true, msg: "Erro ao excluir corretor." });
                }
            };

            return (
                <div className="max-w-2xl mx-auto mt-8 fade-in">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                        <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <IconUsers /> Gerenciar Equipe
                        </h2>
                        
                        <form onSubmit={handleAdd} className="flex flex-col sm:flex-row gap-3 mb-8">
                            <input 
                                type="text" 
                                value={nome}
                                onChange={(e) => setNome(e.target.value)}
                                className="flex-1 px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                placeholder="Nome do novo corretor..."
                            />
                            <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition shadow-sm">
                                Adicionar
                            </button>
                        </form>

                        <div className="border-t border-slate-100 pt-6">
                            <h3 className="font-semibold text-slate-700 mb-4">Corretores Cadastrados ({brokers.length})</h3>
                            {brokers.length === 0 ? (
                                <p className="text-slate-500 text-center py-6 bg-slate-50 rounded-xl border border-dashed border-slate-200">Nenhum corretor cadastrado ainda.</p>
                            ) : (
                                <ul className="space-y-2 max-h-80 overflow-y-auto pr-2">
                                    {brokers.map(broker => (
                                        <li key={broker.id} className="flex items-center justify-between bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <span className="font-medium text-slate-800">{broker.name}</span>
                                            <button 
                                                onClick={() => setDeletingBroker(broker)} 
                                                className="text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition"
                                                title="Remover Corretor"
                                            >
                                                <IconTrash />
                                            </button>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>

                    <ConfirmModal 
                        isOpen={!!deletingBroker}
                        title="Remover Corretor"
                        message={`Deseja remover ${deletingBroker?.name} da lista? Isso NÃO apagará o histórico das captações antigas deste corretor.`}
                        btnConfirm="Sim, Remover"
                        btnCancel="Cancelar"
                        onCancel={() => setDeletingBroker(null)}
                        onConfirm={handleDelete}
                    />

                    <AlertModal 
                        isOpen={showAlert.show}
                        message={showAlert.msg}
                        onClose={() => setShowAlert({ show: false, msg: '' })}
                    />
                </div>
            );
        };

        const CaptureForm = ({ user, setView, brokers }) => {
            const [corretor, setCorretor] = useState('');
            const [codigo, setCodigo] = useState('');
            const [data, setData] = useState('');
            const [showConfirm, setShowConfirm] = useState(false);
            const [showAlert, setShowAlert] = useState({ show: false, msg: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!corretor || !codigo || !data) {
                    setShowAlert({ show: true, msg: "Preencha todos os campos!" });
                    return;
                }
                if (!user) {
                    setShowAlert({ show: true, msg: "Aguarde a conexão com o sistema..." });
                    return;
                }

                try {
                    const capturesRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures');
                    await window.addDoc(capturesRef, {
                        corretor: corretor.trim(),
                        codigo: codigo.trim(),
                        data: data,
                        createdAt: new Date().toISOString()
                    });
                    
                    setShowConfirm(true);
                } catch (err) {
                    console.error("Erro ao salvar:", err);
                    setShowAlert({ show: true, msg: "Erro ao salvar a captação. Tente novamente." });
                }
            };

            const handleNewRegistration = () => {
                setCodigo('');
                // Keep the broker name and date for easier multiple registrations
                setShowConfirm(false);
            };

            const handleGoDashboard = () => {
                setShowConfirm(false);
                setView('dashboard');
            };

            if (brokers.length === 0) {
                return (
                    <div className="max-w-xl mx-auto mt-8 fade-in text-center">
                        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                            <div className="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
                                <IconUsers />
                            </div>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">Nenhum Corretor Cadastrado</h2>
                            <p className="text-slate-600 mb-6">Para registrar uma captação, primeiro você precisa cadastrar os corretores da equipe.</p>
                            <button onClick={() => setView('brokers')} className="bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-3 px-6 rounded-lg shadow-sm">
                                Cadastrar Corretores
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto mt-8 fade-in">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                        <h2 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <IconPlus /> Nova Captação
                        </h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Corretor Responsável</label>
                                <select 
                                    value={corretor}
                                    onChange={(e) => setCorretor(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white"
                                >
                                    <option value="" disabled>Selecione um corretor...</option>
                                    {brokers.map(b => (
                                        <option key={b.id} value={b.name}>{b.name}</option>
                                    ))}
                                </select>
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Código do Imóvel</label>
                                <input 
                                    type="text" 
                                    value={codigo}
                                    onChange={(e) => setCodigo(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                    placeholder="Ex: AP12345"
                                />
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Data da Captação</label>
                                <input 
                                    type="date" 
                                    value={data}
                                    onChange={(e) => setData(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                                />
                            </div>
                            
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition shadow-sm mt-4">
                                Registrar Captação
                            </button>
                        </form>
                    </div>

                    <ConfirmModal 
                        isOpen={showConfirm}
                        title="Captação Registrada com Sucesso!"
                        message="O registro foi salvo no banco de dados. O que deseja fazer agora?"
                        btnConfirm="Cadastrar Novo"
                        btnCancel="Ir para Dashboard"
                        onConfirm={handleNewRegistration}
                        onCancel={handleGoDashboard}
                    />

                    <AlertModal 
                        isOpen={showAlert.show}
                        message={showAlert.msg}
                        onClose={() => setShowAlert({ show: false, msg: '' })}
                    />
                </div>
            );
        };

        const Dashboard = ({ captures, setView, onSelectBroker }) => {
            const [filterMonth, setFilterMonth] = useState(getCurrentMonthStr());

            // Filter captures by selected month
            const filteredCaptures = useMemo(() => {
                if (!filterMonth) return captures;
                return captures.filter(c => c.data && c.data.startsWith(filterMonth));
            }, [captures, filterMonth]);

            // Group by broker
            const brokerStats = useMemo(() => {
                const stats = {};
                filteredCaptures.forEach(c => {
                    const name = c.corretor.trim();
                    // Grouping case-insensitively but displaying the original casing
                    const key = name.toUpperCase();
                    if (!stats[key]) {
                        stats[key] = { name: name, count: 0 };
                    }
                    stats[key].count += 1;
                });
                return Object.values(stats).sort((a, b) => b.count - a.count); // Sort by count descending
            }, [filteredCaptures]);

            const exportMonthlyPDF = () => {
                if (brokerStats.length === 0) {
                    return; // Can add alert modal here if needed
                }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const monthNameRaw = getMonthNameBR(filterMonth);
                const monthName = monthNameRaw.charAt(0).toUpperCase() + monthNameRaw.slice(1);
                const title = `Relatório de Captações - ${monthName}`;
                
                doc.setFontSize(18);
                doc.text(title, 14, 22);
                
                const tableData = brokerStats.map(b => [b.name, b.count]);
                tableData.push(['TOTAL', filteredCaptures.length]);
                
                doc.autoTable({
                    startY: 30,
                    head: [['Corretor', 'Total de Captações']],
                    body: tableData,
                    theme: 'grid',
                    headStyles: { fillColor: [37, 99, 235] } // Tailwind blue-600
                });
                
                const [y, m] = filterMonth.split('-');
                doc.save(`captacoes_${m}_${y}.pdf`);
            };

            return (
                <div className="max-w-4xl mx-auto mt-8 fade-in">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b pb-6">
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                <IconHome /> Dashboard Geral
                            </h2>
                            
                            <div className="flex items-center gap-4">
                                <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
                                    <IconCalendar />
                                    <input 
                                        type="month" 
                                        value={filterMonth}
                                        onChange={(e) => setFilterMonth(e.target.value)}
                                        className="ml-2 outline-none bg-transparent text-slate-700"
                                    />
                                </div>
                                <button 
                                    onClick={exportMonthlyPDF}
                                    className="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 px-4 rounded-lg transition"
                                >
                                    <IconFileText /> PDF
                                </button>
                            </div>
                        </div>

                        {brokerStats.length === 0 ? (
                            <div className="text-center py-12 text-slate-500 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                <p className="mb-2">Nenhuma captação registrada neste mês.</p>
                                <button onClick={() => setView('form')} className="text-blue-600 hover:underline font-medium">Registrar nova captação</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                {brokerStats.map((broker, idx) => (
                                    <div 
                                        key={idx} 
                                        onClick={() => onSelectBroker(broker.name)}
                                        className="bg-white border border-slate-200 hover:border-blue-400 hover:shadow-md transition cursor-pointer rounded-xl p-5 flex flex-col justify-between"
                                    >
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="bg-blue-100 text-blue-600 p-2 rounded-full">
                                                <IconUser />
                                            </div>
                                            <h3 className="font-bold text-slate-800 truncate" title={broker.name}>{broker.name}</h3>
                                        </div>
                                        <div className="flex justify-between items-end">
                                            <span className="text-sm text-slate-500 font-medium">Captações</span>
                                            <span className="text-2xl font-black text-blue-600">{broker.count}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const BrokerDetails = ({ captures, brokerName, onBack, user, brokers }) => {
            const [filterMonth, setFilterMonth] = useState(getCurrentMonthStr());
            const [editingItem, setEditingItem] = useState(null);
            const [deletingItem, setDeletingItem] = useState(null);
            const [showAlert, setShowAlert] = useState({ show: false, msg: '' });

            // Filter specific broker and month
            const filteredData = useMemo(() => {
                return captures.filter(c => {
                    const matchBroker = c.corretor.trim().toUpperCase() === brokerName.toUpperCase();
                    const matchMonth = filterMonth ? c.data && c.data.startsWith(filterMonth) : true;
                    return matchBroker && matchMonth;
                }).sort((a, b) => new Date(b.data) - new Date(a.data));
            }, [captures, brokerName, filterMonth]);

            return (
                <div className="max-w-4xl mx-auto mt-8 fade-in">
                    <button 
                        onClick={onBack}
                        className="flex items-center gap-2 text-slate-600 hover:text-blue-600 font-medium mb-6 transition"
                    >
                        <IconArrowLeft /> Voltar para Dashboard
                    </button>

                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b pb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2 mb-1">
                                    <IconUser /> Detalhes do Corretor
                                </h2>
                                <p className="text-lg text-blue-600 font-semibold">{brokerName}</p>
                            </div>
                            
                            <div className="flex items-center bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
                                <IconCalendar />
                                <input 
                                    type="month" 
                                    value={filterMonth}
                                    onChange={(e) => setFilterMonth(e.target.value)}
                                    className="ml-2 outline-none bg-transparent"
                                />
                            </div>
                        </div>

                        <div className="flex items-center justify-between mb-4 px-2">
                            <h3 className="font-semibold text-slate-700">Imóveis Captados</h3>
                            <span className="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-1 rounded-full">
                                Total: {filteredData.length}
                            </span>
                        </div>

                        {filteredData.length === 0 ? (
                            <div className="text-center py-8 text-slate-500 bg-slate-50 rounded-lg">
                                Nenhuma captação encontrada para este mês.
                            </div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-600 border-b border-slate-200">
                                            <th className="py-3 px-4 font-semibold text-sm rounded-tl-lg">Código do Imóvel</th>
                                            <th className="py-3 px-4 font-semibold text-sm">Data</th>
                                            <th className="py-3 px-4 font-semibold text-sm rounded-tr-lg text-right w-24">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredData.map((item) => (
                                            <tr key={item.id} className="border-b border-slate-100 hover:bg-slate-50 transition">
                                                <td className="py-3 px-4 font-medium text-slate-800">{item.codigo}</td>
                                                <td className="py-3 px-4 text-slate-600">{formatDateToBR(item.data)}</td>
                                                <td className="py-3 px-4 text-right whitespace-nowrap">
                                                    <button onClick={() => setEditingItem({...item})} className="p-1.5 text-blue-600 hover:bg-blue-100 rounded transition mr-1" title="Editar">
                                                        <IconEdit />
                                                    </button>
                                                    <button onClick={() => setDeletingItem(item)} className="p-1.5 text-red-600 hover:bg-red-100 rounded transition" title="Excluir">
                                                        <IconTrash />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* Edit Modal */}
                        {editingItem && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 fade-in">
                                    <h3 className="text-lg font-bold text-slate-800 mb-4">Editar Captação</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Nome do Corretor</label>
                                            <select 
                                                value={editingItem.corretor} 
                                                onChange={(e) => setEditingItem({...editingItem, corretor: e.target.value})} 
                                                className="w-full px-3 py-2 border border-slate-300 rounded outline-none focus:ring-2 focus:ring-blue-500 bg-white" 
                                            >
                                                {brokers.map(b => (
                                                    <option key={b.id} value={b.name}>{b.name}</option>
                                                ))}
                                                {/* Exibe o nome antigo caso o corretor atual não esteja mais na lista ativa */}
                                                {!brokers.some(b => b.name === editingItem.corretor) && (
                                                    <option value={editingItem.corretor}>{editingItem.corretor} (Inativo)</option>
                                                )}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Código do Imóvel</label>
                                            <input 
                                                type="text" 
                                                value={editingItem.codigo} 
                                                onChange={(e) => setEditingItem({...editingItem, codigo: e.target.value})} 
                                                className="w-full px-3 py-2 border border-slate-300 rounded outline-none focus:ring-2 focus:ring-blue-500" 
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Data da Captação</label>
                                            <input 
                                                type="date" 
                                                value={editingItem.data} 
                                                onChange={(e) => setEditingItem({...editingItem, data: e.target.value})} 
                                                className="w-full px-3 py-2 border border-slate-300 rounded outline-none focus:ring-2 focus:ring-blue-500" 
                                            />
                                        </div>
                                    </div>
                                    <div className="flex gap-3 mt-6">
                                        <button onClick={() => setEditingItem(null)} className="flex-1 bg-slate-100 text-slate-700 py-2 rounded font-medium hover:bg-slate-200 transition">Cancelar</button>
                                        <button onClick={async () => {
                                            if (!editingItem.corretor || !editingItem.codigo || !editingItem.data) {
                                                setShowAlert({ show: true, msg: "Preencha todos os campos!" });
                                                return;
                                            }
                                            try {
                                                if (!user) return;
                                                const docRef = window.doc(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures', editingItem.id);
                                                await window.updateDoc(docRef, {
                                                    corretor: editingItem.corretor.trim(),
                                                    codigo: editingItem.codigo.trim(),
                                                    data: editingItem.data
                                                });
                                                setEditingItem(null);
                                            } catch (err) {
                                                console.error("Erro ao atualizar:", err);
                                                setShowAlert({ show: true, msg: "Erro ao salvar as edições." });
                                            }
                                        }} className="flex-1 bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700 transition">Salvar</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Delete Confirm Modal */}
                        <ConfirmModal 
                            isOpen={!!deletingItem}
                            title="Excluir Captação"
                            message={`Tem certeza que deseja excluir a captação do imóvel ${deletingItem?.codigo}? Esta ação não pode ser desfeita.`}
                            btnConfirm="Sim, Excluir"
                            btnCancel="Cancelar"
                            onCancel={() => setDeletingItem(null)}
                            onConfirm={async () => {
                                try {
                                    if (!user) return;
                                    const docRef = window.doc(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures', deletingItem.id);
                                    await window.deleteDoc(docRef);
                                    setDeletingItem(null);
                                } catch (err) {
                                    console.error("Erro ao excluir:", err);
                                    setShowAlert({ show: true, msg: "Erro ao excluir a captação." });
                                }
                            }}
                        />

                        <AlertModal 
                            isOpen={showAlert.show}
                            message={showAlert.msg}
                            onClose={() => setShowAlert({ show: false, msg: '' })}
                        />
                    </div>
                </div>
            );
        };

        const BackupManager = ({ captures, user, brokers }) => {
            const fileInputRef = useRef(null);
            const [showAlert, setShowAlert] = useState({ show: false, msg: '' });
            const [isLoading, setIsLoading] = useState(false);

            const handleExport = () => {
                if (captures.length === 0 && brokers.length === 0) {
                    setShowAlert({ show: true, msg: 'Nenhum dado para exportar.' });
                    return;
                }
                
                // Export both captures and brokers
                const dataToExport = {
                    captures: captures.map(({ corretor, codigo, data }) => ({ corretor, codigo, data })),
                    brokers: brokers.map(({ name }) => ({ name }))
                };
                const dataStr = JSON.stringify(dataToExport, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement("a");
                link.href = url;
                link.download = `backup_captacoes_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const triggerImport = () => {
                if (fileInputRef.current) {
                    // Força a limpeza do input antes de abrir. 
                    // Isso garante que escolher o mesmo arquivo de antes funcione perfeitamente!
                    fileInputRef.current.value = ''; 
                    fileInputRef.current.click();
                }
            };

            const handleImportFile = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsLoading(true);
                setShowAlert({ show: false, msg: '' });

                try {
                    if (!user) throw new Error("Aguarde a conexão com o sistema.");

                    // Método moderno e robusto de leitura (Evita falhas silenciosas)
                    const fileContent = await file.text();
                    
                    if (!fileContent || fileContent.trim() === '') {
                        throw new Error("O arquivo selecionado está vazio.");
                    }
                    
                    let importedData;
                    try {
                        importedData = JSON.parse(fileContent);
                    } catch (parseErr) {
                        throw new Error("O arquivo não é válido. Certifique-se de selecionar o arquivo .json baixado anteriormente por este sistema.");
                    }
                    
                    let importCaptures = [];
                    let importBrokers = [];

                    if (Array.isArray(importedData)) {
                        importCaptures = importedData;
                    } else if (importedData && typeof importedData === 'object') {
                        importCaptures = Array.isArray(importedData.captures) ? importedData.captures : [];
                        importBrokers = Array.isArray(importedData.brokers) ? importedData.brokers : [];
                    } else {
                        throw new Error("Formato de arquivo não reconhecido.");
                    }

                    if (importCaptures.length === 0 && importBrokers.length === 0) {
                        throw new Error("Nenhum dado encontrado no arquivo para importar.");
                    }

                    let newCapturesCount = 0;
                    let newBrokersCount = 0;
                    const capturesRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures');
                    const brokersRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers');

                    const safeString = (val) => (val === null || val === undefined) ? '' : String(val);
                    const currentBrokerNames = brokers.map(b => safeString(b.name).trim().toUpperCase()).filter(Boolean);
                    
                    for (const item of importBrokers) {
                        const bName = safeString(item.name).trim();
                        if (!bName) continue;
                        
                        const nameUpper = bName.toUpperCase();
                        if (!currentBrokerNames.includes(nameUpper)) {
                            await window.addDoc(brokersRef, { name: bName, createdAt: new Date().toISOString() });
                            currentBrokerNames.push(nameUpper); 
                            newBrokersCount++;
                        }
                    }

                    const addedCapturesKeys = new Set(); // Previne duplicatas que estão dentro do próprio arquivo

                    for (const item of importCaptures) {
                        const cCorretor = safeString(item.corretor).trim();
                        const cCodigo = safeString(item.codigo).trim();
                        const cData = safeString(item.data).trim();

                        if (!cCorretor || !cCodigo || !cData) continue;

                        const brokerUpper = cCorretor.toUpperCase();
                        if (!currentBrokerNames.includes(brokerUpper)) {
                            await window.addDoc(brokersRef, { name: cCorretor, createdAt: new Date().toISOString() });
                            currentBrokerNames.push(brokerUpper);
                            newBrokersCount++;
                        }

                        const uniqueKey = `${brokerUpper}_${cCodigo.toUpperCase()}_${cData}`;
                        if (addedCapturesKeys.has(uniqueKey)) continue;

                        const isDuplicate = captures.some(c => 
                            safeString(c.corretor).trim().toUpperCase() === brokerUpper &&
                            safeString(c.codigo).trim().toUpperCase() === cCodigo.toUpperCase() &&
                            safeString(c.data).trim() === cData
                        );

                        if (!isDuplicate) {
                            await window.addDoc(capturesRef, {
                                corretor: cCorretor,
                                codigo: cCodigo,
                                data: cData,
                                createdAt: new Date().toISOString()
                            });
                            addedCapturesKeys.add(uniqueKey);
                            newCapturesCount++;
                        }
                    }
                    
                    setShowAlert({ show: true, msg: `Importação concluída com sucesso!\n\nNovos registros salvos:\n- ${newCapturesCount} Captações\n- ${newBrokersCount} Corretores\n\nQualquer dado duplicado foi ignorado.` });
                } catch (error) {
                    console.error("Erro importando:", error);
                    setShowAlert({ show: true, msg: error.message || "Erro inesperado ao ler o arquivo. Tente novamente." });
                } finally {
                    setIsLoading(false);
                    if (fileInputRef.current) {
                        fileInputRef.current.value = '';
                    }
                }
            };

            return (
                <div className="max-w-xl mx-auto mt-8 fade-in">
                    <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 text-center">
                        <div className="bg-indigo-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600">
                            <IconDownload />
                        </div>
                        <h2 className="text-2xl font-bold text-slate-800 mb-2">Backup de Dados</h2>
                        <p className="text-slate-600 mb-8">
                            Faça o download de todas as suas captações de forma segura, ou restaure um backup anterior. O sistema evita duplicatas automaticamente.
                        </p>

                        <div className="flex flex-col gap-4">
                            <button 
                                onClick={handleExport}
                                className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-4 rounded-lg transition shadow-sm"
                            >
                                <IconDownload /> Exportar Dados (.json)
                            </button>

                            <input 
                                type="file" 
                                accept=".json, application/json, .txt" 
                                ref={fileInputRef} 
                                className="hidden" 
                                onChange={handleImportFile}
                            />
                            
                            <button 
                                onClick={triggerImport}
                                disabled={isLoading}
                                className={`w-full flex items-center justify-center gap-2 border-2 font-semibold py-3 px-4 rounded-lg transition ${isLoading ? 'bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white border-slate-300 hover:border-slate-400 hover:bg-slate-50 text-slate-700'}`}
                            >
                                {isLoading ? (
                                    <span className="animate-pulse">Processando Backup...</span>
                                ) : (
                                    <><IconUpload /> Importar Dados (.json / .txt)</>
                                )}
                            </button>
                        </div>
                    </div>

                    <AlertModal 
                        isOpen={showAlert.show}
                        message={showAlert.msg}
                        onClose={() => setShowAlert({ show: false, msg: '' })}
                    />
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard'); // 'form', 'dashboard', 'broker', 'backup', 'brokers'
            const [selectedBroker, setSelectedBroker] = useState(null);
            
            const [user, setUser] = useState(null);
            const [captures, setCaptures] = useState([]);
            const [brokers, setBrokers] = useState([]);
            const [authLoading, setAuthLoading] = useState(true);

            // Authentication initAuth
                    useEffect(() => {
                        const initAuth = async () => {
                            try {
                                console.log("Iniciando Firebase Auth...");
                                await window.signInAnonymously(window.auth);
                                console.log("Autenticado com sucesso!");
                            } catch (error) {
                                console.error("ERRO CRÍTICO NA AUTENTICAÇÃO:", error.code);
                                console.error("Mensagem:", error.message);
                                if (error.code === 'auth/configuration-not-found') {
                                    alert("ERRO: O provedor de login 'Anônimo' não está ativado no seu painel Firebase. Vá em Authentication > Método de Login > Ativar Anônimo.");
                                } else {
                                    alert("Erro de autenticação: " + error.message);
                                }
                            }
                        };
                        initAuth();
                    }, []);

                const unsubscribeAuth = window.onAuthStateChanged(window.auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                    
                    if (currentUser) {
                        // Fetch all captures globally for this app
                        const capturesRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'captures');
                        const qCaptures = window.query(capturesRef);
                        
                        const unsubscribeData = window.onSnapshot(qCaptures, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setCaptures(data);
                        }, (error) => {
                            console.error("Error fetching captures:", error);
                        });

                        // Fetch brokers globally for this app
                        const brokersRef = window.collection(window.db, 'artifacts', window.__app_id, 'public', 'data', 'brokers');
                        const qBrokers = window.query(brokersRef);

                        const unsubscribeBrokers = window.onSnapshot(qBrokers, (snapshot) => {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            // Sort alphabetically for dropdown usage
                            data.sort((a, b) => a.name.localeCompare(b.name));
                            setBrokers(data);
                        }, (error) => {
                            console.error("Error fetching brokers:", error);
                        });

                        return () => {
                            unsubscribeData();
                            unsubscribeBrokers();
                        };
                    } else {
                        setCaptures([]);
                        setBrokers([]);
                    }
                });

                initAuth();
                return () => unsubscribeAuth();
            }, []);

            const navigate = (newView) => {
                setView(newView);
                setSelectedBroker(null);
            };

            const handleBrokerSelect = (brokerName) => {
                setSelectedBroker(brokerName);
                setView('broker');
            };

            if (authLoading) {
                return <div className="h-screen flex items-center justify-center text-slate-500 font-medium text-lg">Conectando ao banco de dados seguro...</div>;
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation Bar */}
                    <nav className="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16">
                                <div className="flex flex-shrink-0 items-center">
                                    <h1 className="text-xl font-black text-blue-600 tracking-tight">Capta<span className="text-slate-800">Pro</span></h1>
                                </div>
                                <div className="flex items-center space-x-1 sm:space-x-3 overflow-x-auto px-2 pb-1 sm:pb-0">
                                    <button 
                                        onClick={() => navigate('dashboard')}
                                        className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-sm font-medium transition whitespace-nowrap ${view === 'dashboard' || view === 'broker' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                                    >
                                        <IconHome /> <span className="hidden sm:inline">Dashboard</span>
                                    </button>
                                    <button 
                                        onClick={() => navigate('brokers')}
                                        className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-sm font-medium transition whitespace-nowrap ${view === 'brokers' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                                    >
                                        <IconUsers /> <span className="hidden sm:inline">Corretores</span>
                                    </button>
                                    <button 
                                        onClick={() => navigate('form')}
                                        className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-sm font-medium transition whitespace-nowrap ${view === 'form' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                                    >
                                        <IconPlus /> <span className="hidden sm:inline">Nova</span>
                                    </button>
                                    <button 
                                        onClick={() => navigate('backup')}
                                        className={`flex items-center gap-1.5 px-3 py-2 rounded-md text-sm font-medium transition whitespace-nowrap ${view === 'backup' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                                    >
                                        <IconDownload /> <span className="hidden sm:inline">Backup</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 w-full max-w-5xl mx-auto px-4 sm:px-6 py-6 overflow-hidden">
                        {view === 'form' && <CaptureForm user={user} setView={navigate} brokers={brokers} />}
                        {view === 'brokers' && <BrokerManager user={user} brokers={brokers} />}
                        {view === 'dashboard' && <Dashboard captures={captures} setView={navigate} onSelectBroker={handleBrokerSelect} />}
                        {view === 'broker' && selectedBroker && <BrokerDetails captures={captures} brokerName={selectedBroker} onBack={() => navigate('dashboard')} user={user} brokers={brokers} />}
                        {view === 'backup' && <BackupManager captures={captures} user={user} brokers={brokers} />}
                    </main>
                    
                    <footer className="text-center py-6 text-slate-400 text-sm">
                        <p>Os dados são salvos de forma segura no seu aplicativo.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
