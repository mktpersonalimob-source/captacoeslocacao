<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptaPro - Gestão de Locações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- PREENCHA SUAS CHAVES AQUI ---
        const firebaseConfig = {
            apiKey: "AIzaSyBxPTPN6UGWt3lkidtwU2hMF_sU7RGOeEo",
            authDomain: "cap-pro-loc.firebaseapp.com",
            projectId: "cap-pro-loc",
            storageBucket: "cap-pro-loc.firebasestorage.app",
            messagingSenderId: "1026522877878",
            appId: "1:1026522877878:web:cc8d2f156fd0bee024bb17",
            measurementId: "G-D00DLYECPN"
        };
        // ----------------------------------

        // Inicialização Segura
        let app, db, auth;
        try {
            if (firebaseConfig.apiKey !== "SUA_API_KEY_AQUI") {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
            }
        } catch (e) {
            console.error("Erro ao inicializar Firebase:", e);
        }

        window.db = db;
        window.auth = auth;
        window.signInAnonymously = signInAnonymously;
        window.collection = collection;
        window.query = query;
        window.onSnapshot = onSnapshot;
        window.addDoc = addDoc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDocs = getDocs;
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ConfigScreen = () => (
            <div className="min-h-screen flex items-center justify-center p-4">
                <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg">
                    <h2 className="text-xl font-bold text-red-600 mb-4">Configuração do Firebase Pendente</h2>
                    <p className="text-slate-600 mb-4">Parece que as chaves do Firebase não foram configuradas. Abra o arquivo index.html e preencha o objeto <code>firebaseConfig</code> no topo do script.</p>
                </div>
            </div>
        );

        const LoginScreen = ({ onLogin }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === 'mkt123') onLogin();
                else { setError('Senha incorreta!'); setPassword(''); }
            };
            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                        <h1 className="text-2xl font-bold text-slate-800 mb-6">Acesso ao Sistema</h1>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Senha" autoFocus />
                            {error && <p className="text-red-500 text-sm">{error}</p>}
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">Entrar</button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [authenticated, setAuthenticated] = useState(false);
            const [ready, setReady] = useState(false);

            useEffect(() => {
                if (!window.auth) return;
                window.signInAnonymously(window.auth)
                    .then(() => setReady(true))
                    .catch(err => console.error("Auth error", err));
            }, []);

            if (!window.db) return <ConfigScreen />;
            if (!authenticated) return <LoginScreen onLogin={() => setAuthenticated(true)} />;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white shadow-sm border-b p-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-black text-blue-600">Capta<span className="text-slate-800">Pro</span></h1>
                        </div>
                    </nav>
                    <main className="flex-1 w-full max-w-5xl mx-auto p-4">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border">
                            <h2 className="text-xl font-bold">Sistema Ativo</h2>
                            <p>Conectado ao banco de dados com sucesso.</p>
                        </div>
                    </main>
                    <footer className="text-center py-6 text-slate-400 text-sm">
                        <p>Criado por Guilherme Montoani</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
