<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptaPro - Acesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxPTPN6UGWt3lkidtwU2hMF_sU7RGOeEo",
            authDomain: "cap-pro-loc.firebaseapp.com",
            projectId: "cap-pro-loc",
            storageBucket: "cap-pro-loc.firebasestorage.app",
            messagingSenderId: "1026522877878",
            appId: "1:1026522877878:web:cc8d2f156fd0bee024bb17"
        };
        
        window.app = initializeApp(firebaseConfig);
        window.db = getFirestore(window.app);
        window.auth = getAuth(window.app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AuthScreen = ({ onLoginSuccess }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await window.signInWithEmailAndPassword(window.auth, email, password);
                    // O onAuthStateChanged tratará a mudança de estado
                } catch (err) {
                    setError("Erro ao acessar: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="flex items-center justify-center min-h-screen">
                    <form onSubmit={handleLogin} className="bg-white p-8 rounded-xl shadow-lg w-96">
                        <h2 className="text-2xl font-bold mb-6 text-blue-600">Login CaptaPro</h2>
                        {error && <p className="text-red-500 mb-4 text-sm bg-red-50 p-2 rounded">{error}</p>}
                        <input type="email" required placeholder="E-mail" className="w-full p-3 mb-4 border rounded" onChange={e => setEmail(e.target.value)} />
                        <input type="password" required placeholder="Senha" className="w-full p-3 mb-6 border rounded" onChange={e => setPassword(e.target.value)} />
                        <button disabled={loading} className="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">
                            {loading ? "Entrando..." : "Entrar"}
                        </button>
                    </form>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = window.onAuthStateChanged(window.auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            if (loading) return <div className="p-10 text-center">Carregando sistema...</div>;
            
            // Se não houver usuário, exibe a tela de login. Caso contrário, exibe o conteúdo logado.
            if (!user) return <AuthScreen />;
            
            return (
                <div className="p-10 text-center">
                    <h1 className="text-3xl font-bold text-blue-600">Bem-vindo ao CaptaPro!</h1>
                    <p className="mt-4">Você está logado e pode utilizar o Dashboard.</p>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
